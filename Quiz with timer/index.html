<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App with Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div id="start-screen" class="screen active">
            <h1>JavaScript Quiz</h1>
            <p>You have 30 seconds to answer all questions.</p>
            <button id="start-btn" class="btn">Start Quiz</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <span id="question-tracker">Question 1 / 3</span>
                <span class="timer">Time Left: <span id="time">30</span>s</span>
            </div>
            
            <h2 id="question-text">Question goes here</h2>
            <div id="options-container">
                </div>
            
            <button id="next-btn" class="btn hide">Next Question</button>
        </div>

        <div id="result-screen" class="screen">
            <h2>Quiz Completed!</h2>
            <p>Your Final Score:</p>
            <h1 id="final-score">0/3</h1>
            <button id="restart-btn" class="btn">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
