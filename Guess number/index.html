<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Number</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">
    <h1>Guess the Number</h1>
    <p>I am thinking of a number between <strong>1 and 100</strong>.</p>
    
    <div class="input-section">
      <input type="number" id="guessInput" placeholder="Enter guess (1-100)" min="1" max="100">
      <button id="submitBtn">Guess</button>
    </div>

    <p id="message"></p>
    <p id="attempts">Attempts: 0</p>
    
    <button id="restartBtn" style="display: none;">Play Again</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
